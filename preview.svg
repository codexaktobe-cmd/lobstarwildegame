<svg viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <radialGradient id="bg1" cx="30%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#0b5ba8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#021a3a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="70%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#00d4b4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#021a3a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#042050"/>
      <stop offset="50%" stop-color="#062d72"/>
      <stop offset="100%" stop-color="#031d55"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c97a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#e8c97a" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="ray1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a8fe3" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1a8fe3" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e8c8"/>
      <stop offset="100%" stop-color="#00b89a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="arena-clip">
      <rect x="0" y="0" width="860" height="420" rx="16"/>
    </clipPath>
  </defs>

  <!-- Ocean background -->
  <rect width="860" height="420" rx="16" fill="url(#ocean)"/>
  <rect width="860" height="420" rx="16" fill="url(#bg1)"/>
  <rect width="860" height="420" rx="16" fill="url(#bg2)"/>

  <g clip-path="url(#arena-clip)">
    <!-- Light rays -->
    <rect x="100" y="0" width="3" height="420" fill="url(#ray1)" transform="rotate(-8 100 0)"/>
    <rect x="240" y="0" width="5" height="420" fill="url(#ray1)" opacity="0.7" transform="rotate(5 240 0)"/>
    <rect x="450" y="0" width="3" height="420" fill="url(#ray1)" transform="rotate(-3 450 0)"/>
    <rect x="640" y="0" width="6" height="420" fill="url(#ray1)" opacity="0.5" transform="rotate(10 640 0)"/>
    <rect x="790" y="0" width="3" height="420" fill="url(#ray1)" opacity="0.6" transform="rotate(-6 790 0)"/>

    <!-- Bubbles -->
    <circle cx="60" cy="300" r="5" fill="none" stroke="#64c8ff" stroke-width="1" opacity="0.3"/>
    <circle cx="180" cy="200" r="3" fill="none" stroke="#64c8ff" stroke-width="1" opacity="0.25"/>
    <circle cx="700" cy="250" r="6" fill="none" stroke="#64c8ff" stroke-width="1" opacity="0.2"/>
    <circle cx="820" cy="180" r="4" fill="none" stroke="#64c8ff" stroke-width="1" opacity="0.3"/>
    <circle cx="380" cy="120" r="3" fill="none" stroke="#64c8ff" stroke-width="1" opacity="0.2"/>

    <!-- Sand floor -->
    <rect x="0" y="370" width="860" height="50" fill="url(#sand)"/>
    <line x1="0" y1="372" x2="860" y2="372" stroke="#e8c97a" stroke-width="0.5" opacity="0.2"/>

    <!-- Seaweed -->
    <text x="35" y="372" font-size="28" opacity="0.8" transform="rotate(-8 35 372)">🌿</text>
    <text x="145" y="372" font-size="28" opacity="0.75" transform="rotate(8 145 372)">🌿</text>
    <text x="690" y="372" font-size="28" opacity="0.8" transform="rotate(-6 690 372)">🌿</text>
    <text x="800" y="372" font-size="28" opacity="0.75" transform="rotate(9 800 372)">🌿</text>

    <!-- Food items scattered -->
    <text x="150" y="180" font-size="26" filter="url(#glow)">🦐</text>
    <text x="320" y="120" font-size="26" filter="url(#glow)">🐟</text>
    <text x="580" y="220" font-size="26" filter="url(#glow)">🦀</text>
    <text x="720" y="150" font-size="26" filter="url(#glow)">🦑</text>
    <text x="80" y="280" font-size="26" filter="url(#glow)">🦪</text>

    <!-- Enemy shark -->
    <text x="660" y="310" font-size="30" filter="url(#glow)">🦈</text>
    <!-- Enemy jellyfish -->
    <text x="200" y="310" font-size="28" opacity="0.9">🪼</text>

    <!-- Lobster (main character) -->
    <text x="390" y="260" font-size="44" filter="url(#softglow)">🦞</text>

    <!-- Thought bubble -->
    <rect x="390" y="185" width="110" height="32" rx="16" fill="rgba(255,255,255,0.92)"/>
    <text x="445" y="206" font-size="13" font-weight="700" fill="#1a2a3a" text-anchor="middle">Eureka! 💡</text>

    <!-- Score pop -->
    <text x="408" y="170" font-size="20" font-weight="900" fill="#ffb830" font-family="Arial Black, Arial" opacity="0.9">+150</text>

    <!-- Level badge -->
    <rect x="762" y="12" width="84" height="26" rx="13" fill="rgba(255,184,48,0.15)" stroke="rgba(255,184,48,0.5)" stroke-width="1"/>
    <text x="804" y="29" font-size="12" font-weight="700" fill="#ffcc66" text-anchor="middle" letter-spacing="0.5">LEVEL 3</text>

    <!-- UI overlay at top: stat cards -->
    <!-- Score card -->
    <rect x="10" y="10" width="90" height="50" rx="10" fill="rgba(4,18,48,0.8)" stroke="rgba(26,143,227,0.3)" stroke-width="1"/>
    <text x="55" y="26" font-size="10" font-weight="700" fill="#7fc4f0" text-anchor="middle" letter-spacing="0.5">SCORE</text>
    <text x="55" y="50" font-size="22" font-weight="900" fill="#ffb830" text-anchor="middle" font-family="Arial Black, Arial">320</text>

    <!-- Lives card -->
    <rect x="110" y="10" width="90" height="50" rx="10" fill="rgba(4,18,48,0.8)" stroke="rgba(26,143,227,0.3)" stroke-width="1"/>
    <text x="155" y="26" font-size="10" font-weight="700" fill="#7fc4f0" text-anchor="middle" letter-spacing="0.5">LIVES</text>
    <text x="155" y="50" font-size="18" text-anchor="middle">❤️❤️❤️</text>

    <!-- Combo card -->
    <rect x="210" y="10" width="90" height="50" rx="10" fill="rgba(4,18,48,0.8)" stroke="rgba(26,143,227,0.3)" stroke-width="1"/>
    <text x="255" y="26" font-size="10" font-weight="700" fill="#7fc4f0" text-anchor="middle" letter-spacing="0.5">COMBO</text>
    <text x="255" y="50" font-size="22" font-weight="900" fill="#ff6b5b" text-anchor="middle" font-family="Arial Black, Arial">x3</text>
  </g>

  <!-- Outer border -->
  <rect x="0.75" y="0.75" width="858.5" height="418.5" rx="15.5" fill="none" stroke="rgba(26,143,227,0.35)" stroke-width="1.5"/>

  <!-- Bottom bar: title + play button hint -->
  <rect x="0" y="382" width="860" height="38" rx="0" fill="rgba(2,10,30,0.7)"/>
  <rect x="0" y="382" width="860" height="38" fill="rgba(2,10,30,0.7)"/>
  <text x="24" y="406" font-size="13" font-weight="700" fill="#00d4b4" letter-spacing="0.3">🦞 Lobstar Wilde</text>
  <text x="150" y="406" font-size="13" fill="#7fc4f0">— The Smart Lobster · Pure HTML5 · No dependencies</text>
  <rect x="680" y="390" width="160" height="22" rx="11" fill="url(#btnGrad)"/>
  <text x="760" y="406" font-size="12" font-weight="700" fill="#021a3a" text-anchor="middle" letter-spacing="0.5">▶ PLAY NOW</text>
</svg>
